# DEPLOYMENT WORKFLOW
#
# dist/ is gitignored so developers never commit build artifacts manually.
# This workflow handles it: on every push to main it builds the project,
# force-commits dist/ back to main (with [skip ci] to avoid loops), and
# then deploys to GitHub Pages.
#
# Hostinger auto-pulls from main and serves static files from dist/.
# GitHub Pages gets the same build via the upload-pages-artifact action.
#
# TL;DR: just push source changes — dist/ takes care of itself.

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for secrets
        run: npm run secrets:scan

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit dist to main (for Hostinger)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if git diff --cached --quiet; then
            echo "No dist changes to commit"
          else
            git commit -m "chore: rebuild dist artifacts [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  verify-production-security-headers:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: read
    # This job runs three live smoke tests, each with a 10-minute propagation retry
    # window plus its own test timeout buffer. Keep enough headroom for all tests
    # and the npm install/setup time so deploy verification can complete reliably.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify live HSTS on Hostinger
        env:
          EUROALT_LIVE_BASE_URL: https://european-alternatives.cloud
          EUROALT_LIVE_VERIFY_TIMEOUT_MS: '600000'
          EUROALT_LIVE_VERIFY_INTERVAL_MS: '15000'
        run: npm test -- --run tests/hsts-live-deployment.test.ts

      - name: Verify live CSP-compatible HTML on Hostinger
        env:
          EUROALT_LIVE_BASE_URL: https://european-alternatives.cloud
          EUROALT_LIVE_VERIFY_TIMEOUT_MS: '600000'
          EUROALT_LIVE_VERIFY_INTERVAL_MS: '15000'
        run: npm test -- --run tests/csp-live-deployment.test.ts

      - name: Verify live X-Content-Type-Options on Hostinger
        env:
          EUROALT_LIVE_BASE_URL: https://european-alternatives.cloud
          EUROALT_LIVE_VERIFY_TIMEOUT_MS: '600000'
          EUROALT_LIVE_VERIFY_INTERVAL_MS: '15000'
        run: npm test -- --run tests/x-content-type-options-live-deployment.test.ts
